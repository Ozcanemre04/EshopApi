name: Deploy .NET App to Azure

on:
  workflow_dispatch:
  push:
    branch:
     - main


jobs:
  build-test-deploy:
   runs-on: ubuntu-latest

   steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore
    
    - name: Run unit tests
      run: dotnet test --no-restore --configuration Release